# docker-compose.yml

services:
  # 1. Service cho Ứng dụng Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: khao-sat-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - khao-sat-network
    depends_on:
      - db

  # 2. Service cho Web Server (Nginx)
  nginx:
    image: nginx:1.25-alpine
    container_name: khao-sat-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - khao-sat-network
    depends_on:
      - app

  # 3. Service cho Database (MySQL)
  db:
    image: mysql:8.0
    container_name: khao-sat-db
    restart: unless-stopped
    ports:
      - "33066:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-khao_sat_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tho493}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tho493}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - khao-sat-db-data:/var/lib/mysql
    networks:
      - khao-sat-network

networks:
  khao-sat-network:
    driver: bridge

volumes:
  khao-sat-db-data:
    driver: local